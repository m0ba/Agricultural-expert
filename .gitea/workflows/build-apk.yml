name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install client dependencies
        working-directory: client
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android @nicokoenig/capacitor-nodejs

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Init Capacitor
        working-directory: client
        run: |
          npx cap init "农事专家" "com.agriexpert.app" --web-dir dist
          npx cap add android

      - name: Copy backend to Android assets
        run: |
          mkdir -p client/android/app/src/main/assets/nodejs
          cp -r server client/android/app/src/main/assets/nodejs/server
          cp server/package.json client/android/app/src/main/assets/nodejs/package.json

      - name: Sync Capacitor
        working-directory: client
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x client/android/gradlew

      - name: Build APK
        working-directory: client/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agri-expert-apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk