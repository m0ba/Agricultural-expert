name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('client/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Install server production dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Add Android platform
        working-directory: client
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Prune server node_modules
        working-directory: server/node_modules
        run: |
          find . -type d \( -name "test" -o -name "tests" -o -name "__tests__" -o -name "example" -o -name "examples" -o -name "docs" -o -name ".github" -o -name "benchmark" \) -exec rm -rf {} + 2>/dev/null || true
          find . -type f \( -name "*.md" -o -name "*.ts" -o -name "*.map" -o -name "CHANGELOG*" -o -name "LICENSE*" -o -name ".npmignore" -o -name ".eslintrc*" -o -name ".prettierrc*" -o -name "tsconfig*" -o -name "*.d.ts" \) -exec rm -f {} + 2>/dev/null || true

      - name: Copy backend to Android assets
        run: |
          mkdir -p client/android/app/src/main/assets/nodejs
          cp -r server client/android/app/src/main/assets/nodejs/server
          rm -rf client/android/app/src/main/assets/nodejs/server/node_modules/.cache 2>/dev/null || true
          cp server/package.json client/android/app/src/main/assets/nodejs/package.json

      - name: Sync Capacitor
        working-directory: client
        run: npx cap sync android

      - name: Add ABI filter (arm64 only)
        working-directory: client/android
        run: |
          sed -i '/defaultConfig {/a \        ndk { abiFilters "arm64-v8a" }' app/build.gradle

      - name: Make Gradlew executable
        run: chmod +x client/android/gradlew

      - name: Build Debug APK
        working-directory: client/android
        run: ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: client/android
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: agri-expert-debug-apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: agri-expert-release-apk
          path: client/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            client/android/app/build/outputs/apk/debug/app-debug.apk
            client/android/app/build/outputs/apk/release/app-release-unsigned.apk
