name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install client dependencies
        working-directory: client
        run: npm install --legacy-peer-deps

      - name: Fix capacitor-nodejs case bug (Bridge.h → bridge.h)
        run: cp client/node_modules/capacitor-nodejs/android/src/main/cpp/Bridge.h client/node_modules/capacitor-nodejs/android/src/main/cpp/bridge.h

      - name: Install server dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Copy backend to dist/nodejs
        run: |
          mkdir -p client/dist/nodejs
          cp -r server/index.js server/package.json client/dist/nodejs/
          cp -r server/routes client/dist/nodejs/
          cp -r server/services client/dist/nodejs/
          cp -r server/plugins client/dist/nodejs/
          cp -r server/scheduler client/dist/nodejs/
          cp -r server/knowledge client/dist/nodejs/
          # Copy node_modules (pure JS deps)
          cp -r server/node_modules client/dist/nodejs/
          # ─── Strip node_modules bloat ───
          find client/dist/nodejs/node_modules -type f \( -name "*.md" -o -name "*.ts" -o -name "*.map" -o -name "*.d.ts" \) -delete
          find client/dist/nodejs/node_modules -type d \( -name "test" -o -name "tests" -o -name "__tests__" -o -name "example" -o -name "examples" -o -name "docs" -o -name ".cache" \) -exec rm -rf {} + 2>/dev/null; true
          # Remove node-gyp / prebuild artifacts
          find client/dist/nodejs/node_modules -type f -name "*.node" -delete 2>/dev/null; true
          rm -rf client/dist/nodejs/node_modules/.cache

      - name: Add Android platform
        working-directory: client
        run: npx cap add android

      - name: Set arm64-v8a only (reduce APK size)
        run: |
          BUILD_GRADLE=client/android/app/build.gradle
          if grep -q "abiFilters" "$BUILD_GRADLE"; then
            echo "abiFilters already set"
          else
            sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' "$BUILD_GRADLE"
          fi

      - name: Sync Capacitor
        working-directory: client
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x client/android/gradlew

      - name: Build APK
        working-directory: client/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agri-expert-apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
