name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install client dependencies
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Fix capacitor-nodejs case-sensitivity (Bridge.h → bridge.h)   
        run: |
          NODEJS_CPP=client/node_modules/capacitor-nodejs/android/src/main/cpp
          cp "$NODEJS_CPP/Bridge.h" "$NODEJS_CPP/bridge.h"

      - name: Install server dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Copy backend to dist/nodejs
        run: |
          mkdir -p client/dist/nodejs
          cp -r server/index.js server/package.json client/dist/nodejs/
          cp -r server/routes client/dist/nodejs/
          cp -r server/services client/dist/nodejs/
          cp -r server/plugins client/dist/nodejs/
          cp -r server/scheduler client/dist/nodejs/
          cp -r server/knowledge client/dist/nodejs/
          # Copy node_modules (pure JS deps, already installed by npm ci above)
          cp -r server/node_modules client/dist/nodejs/
          # Remove dev-only files
          rm -rf client/dist/nodejs/node_modules/.cache

      - name: Add Android platform
        working-directory: client
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: client
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x client/android/gradlew

      - name: Build APK
        working-directory: client/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agri-expert-apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
