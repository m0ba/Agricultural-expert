# 番茄 - 完整作物数据
name: 番茄
family: 茄科
latin_name: Solanycopersicon lycopersicum

total_days: 150  # 全生育期天数（参考值）

stages:
  - name: 育苗期
    order: 1
    typical_days: 35
    description: 从播种到定植前的苗期管理
    key_points:
      - 控制温度促进壮苗
      - 适当控水蹲苗
      - 注意猝倒病和立枯病防治
      - 2叶1心时分苗
      - 定植前7天开始炼苗
    temperature:
      day: "25-28°C"
      night: "15-18°C"
    watering: "见干见湿，控水蹲苗"
    fertilization: "2叶1心后追施少量复合肥"
    pest_watch:
      - 猝倒病
      - 立枯病
      - 蚜虫
    detail_fields:
      - name: 苗龄天数
        type: stepper
        min: 1
        max: 60
        step: 1
      - name: 出苗情况
        type: select
        options: ["未出苗", "刚出苗", "出苗整齐", "出苗不齐"]
      - name: 子叶状态
        type: select
        options: ["未展开", "刚展开", "完全展开", "发黄脱落"]
      - name: 真叶数量
        type: stepper
        min: 0
        max: 20
        step: 1
      - name: 茎秆表现
        type: select
        options: ["正常粗壮", "偏细徒长", "矮壮蹲苗"]
      - name: 是否炼苗
        type: select
        options: ["未开始", "炼苗中", "炼苗完成"]

  - name: 定植缓苗期
    order: 2
    typical_days: 10
    description: 定植到缓苗完成
    key_points:
      - 定植后浇透定根水
      - 3-5天内适当遮阳
      - 缓苗后中耕松土
      - 检查死苗及时补苗
      - 定植后第7天冲施生根剂
    temperature:
      day: "25-30°C"
      night: "15-18°C"
    watering: "定植水浇透，缓苗期控水"
    fertilization: "缓苗后追施提苗肥"
    pest_watch:
      - 蚜虫
      - 白粉虱
      - 根腐病
    detail_fields:
      - name: 定植天数
        type: stepper
        min: 1
        max: 30
        step: 1
      - name: 缓苗状态
        type: select
        options: ["未缓苗", "缓苗中", "缓苗完成"]
      - name: 新叶生长
        type: select
        options: ["无变化", "心叶开始生长", "新叶展开2片以上"]
      - name: 叶片表现
        type: select
        options: ["正常挺立", "轻微萎蔫", "严重萎蔫", "叶缘发黄"]
      - name: 根系表现
        type: select
        options: ["未观察", "白根已扎出", "根系发达"]

  - name: 初花期
    order: 3
    typical_days: 20
    description: 第一穗花现蕾到坐果
    key_points:
      - 控制温度促进花芽分化
      - 适时打杈整枝
      - 蘸花保果（设施内需辅助授粉）
      - 第一穗果坐住后开始追肥
      - 防止落花落果
    temperature:
      day: "25-28°C"
      night: "13-15°C"
    watering: "初花期控水，促进坐果"
    fertilization: "第一穗果膨大期追施高钾复合肥"
    pest_watch:
      - 早疫病
      - 灰霉病
      - 病毒病
      - 蚜虫
    detail_fields:
      - name: 花穗位置
        type: stepper
        min: 1
        max: 10
        step: 1
      - name: 开花状态
        type: select
        options: ["现蕾", "花穗伸长", "花朵开放", "授粉完成"]
      - name: 花朵数量
        type: stepper
        min: 0
        max: 100
        step: 1
      - name: 花朵质量
        type: select
        options: ["花色正常", "花小色淡", "花多脱落", "未观察"]
      - name: 坐果数量
        type: stepper
        min: 0
        max: 100
        step: 1
      - name: 坐果情况
        type: select
        options: ["未坐果", "开始坐果", "坐果率偏低"]
      - name: 侧枝状态
        type: select
        options: ["未处理", "已打杈", "需要打杈"]
      - name: 植株高度
        type: stepper
        min: 10
        max: 300
        step: 5
        unit: cm
        reference: "初花期参考：80-150cm"

  - name: 盛果期
    order: 4
    typical_days: 60
    description: 果实膨大成熟到持续采收
    key_points:
      - 加强水肥供应
      - 适时采收促进后续坐果
      - 注意裂果和脐腐病预防
      - 整枝打顶控制株型
      - 高温期注意通风降温
    temperature:
      day: "25-30°C"
      night: "15-18°C"
    watering: "保持土壤湿润，避免忽干忽湿"
    fertilization: "每穗果膨大期追肥，高钾型"
    pest_watch:
      - 晚疫病
      - 叶霉病
      - 灰霉病
      - 棉铃虫
    detail_fields:
      - name: 果穗节位
        type: stepper
        min: 1
        max: 20
        step: 1
      - name: 果实大小
        type: select
        options: ["幼果", "膨大初期", "膨大中期", "接近成熟"]
      - name: 果实颜色
        type: select
        options: ["绿色", "开始转色", "转色50%", "成熟可采"]
      - name: 果实品质
        type: select
        options: ["正常", "裂果", "畸形果", "日灼", "脐腐", "未观察"]
      - name: 挂果数量
        type: stepper
        min: 0
        max: 100
        step: 1
      - name: 植株高度
        type: stepper
        min: 10
        max: 300
        step: 5
        unit: cm
      - name: 植株长势
        type: select
        options: ["旺盛", "正常", "偏弱", "早衰迹象"]
      - name: 叶片状态
        type: select
        options: ["正常", "下部老叶发黄", "大量落叶", "病斑可见"]

  - name: 采收期
    order: 5
    typical_days: 45
    description: 持续采收直到拉秧
    key_points:
      - 及时采收保证品质
      - 采收后追肥恢复植株
      - 注意末期植株衰老管理
      - 适时拉秧换茬
    temperature:
      day: "22-28°C"
      night: "13-16°C"
    watering: "后期适当控水"
    fertilization: "采收后期减少施肥"
    pest_watch:
      - 绵疫病
      - 灰霉病
    detail_fields:
      - name: 采收阶段
        type: select
        options: ["始收期", "采收盛期", "采收后期"]
      - name: 果实品质
        type: select
        options: ["优", "良", "一般", "较差"]
      - name: 植株高度
        type: stepper
        min: 10
        max: 300
        step: 5
        unit: cm
      - name: 植株状态
        type: select
        options: ["正常挂果", "挂果减少", "叶片衰老", "准备拉秧"]

diseases:
  - 早疫病
  - 晚疫病
  - 灰霉病
  - 叶霉病
  - 病毒病
  - 脐腐病
  - 绵疫病
  - 根腐病
  - 蚜虫
  - 白粉虱
