# 病毒病
name: 病毒病
alias: 花叶病
pathogen_type: 病毒
pathogen_name: TMV/CMV/ToMV
crops: [番茄, 辣椒]

symptoms:
  leaf: 叶片出现花叶、黄化、卷曲、皱缩
  stem: 植株矮化，节间缩短
  fruit: 果实变小畸形，着色不均

conditions:
  temperature: "20-30°C"
  humidity: "干燥条件有利蚜虫传毒"
  season: 高温干旱季节多发
  triggers: [高温干旱, 蚜虫大发生, 操作摩擦传毒]

agricultural_control:
  - 选用抗病品种
  - 种子消毒处理
  - 及时防治蚜虫白粉虱
  - 操作工具消毒
  - 拔除病株
  - 加强肥水管理提高抗性

chemical_control:
  - name: 盐酸吗啉胍
    dilution: 500倍
    interval: 7天
    method: 喷雾
  - name: 宁南霉素
    dilution: 500倍
    interval: 7天
    method: 喷雾
  - name: 菌毒清
    dilution: 300倍
    interval: 7天
    method: 喷雾
  - name: 氨基寡糖素
    dilution: 1000倍
    interval: 10天
    method: 喷雾（诱抗剂）

biological_control:
  - 菇类蛋白多糖
  - 氨基寡糖素

risk_model:
  temp_range: [25, 35]
  humidity_threshold: 40
  rain_days_trigger: 0
  risk_level_map:
    high: "温度>30°C + 湿度<40% + 蚜虫大量发生"
    medium: "温度25-30°C + 蚜虫可见"
    low: "其他情况"
