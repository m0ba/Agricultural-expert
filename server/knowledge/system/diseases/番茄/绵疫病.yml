# 绵疫病
name: 绵疫病
alias: 疫霉果腐病
pathogen_type: 真菌
pathogen_name: Phytophthora capsici
crops: [番茄]

symptoms:
  fruit: 果实出现水渍状大斑，后变淡褐色软腐，表面生白色棉絮状霉
  stem: 茎基部水渍状腐烂
  leaf: 叶片水渍状大斑

conditions:
  temperature: "25-30°C"
  humidity: "相对湿度>85%"
  season: 高温多雨季节
  triggers: [高温高湿, 积水, 通风不良]

agricultural_control:
  - 避免果实接触地面
  - 及时排水
  - 通风降湿
  - 摘除病果
  - 覆盖地膜
  - 高畦种植

chemical_control:
  - name: 甲霜灵锰锌
    dilution: 600倍
    interval: 7天
    method: 喷雾
  - name: 烯酰吗啉
    dilution: 1500倍
    interval: 10天
    method: 喷雾
  - name: 霜脲氰
    dilution: 700倍
    interval: 7天
    method: 喷雾
  - name: 氟啶胺
    dilution: 2000倍
    interval: 10天
    method: 喷雾

biological_control:
  - 木霉菌
  - 枯草芽孢杆菌

risk_model:
  temp_range: [25, 30]
  humidity_threshold: 85
  rain_days_trigger: 3
  risk_level_map:
    high: "温度25-30°C + 湿度>85% + 连续降雨3天以上"
    medium: "温度25-30°C + 湿度>75%"
    low: "其他情况"
