# 十字花科 - 科属共性知识
family: 十字花科
latin_name: Cruciferae

common_traits:
  temperature: 喜冷凉，适宜温度15-20°C，耐寒性较强，不耐高温
  humidity: 适宜相对湿度60-75%
  light: 喜充足光照，光照不足易徒长
  soil: 喜肥沃疏松土壤，pH 6.0-7.0，需钙量大
  water: 需水均匀，包心期不可缺水

common_diseases:
  - 软腐病
  - 霜霉病
  - 黑腐病
  - 根肿病
  - 菌核病
  - 病毒病

common_pests:
  - 菜青虫
  - 小菜蛾
  - 蚜虫
  - 跳甲
  - 夜蛾

management_points:
  - 需肥量大，尤其氮肥和钙肥
  - 注意预防软腐病，避免田间积水
  - 包心期适当控水防止裂球
  - 轮作3年以上减少根肿病发生
  - 设施内注意通风降温

crops:
  - 大白菜
  - 甘蓝
  - 花椰菜
  - 西兰花
  - 芥蓝
  - 萝卜
