# 叶菜类 - 共性知识
family: 叶菜类

common_traits:
  temperature: 喜冷凉，适宜温度15-22°C，不耐高温
  humidity: 适宜相对湿度70-85%
  light: 需光但不耐强光，夏季需遮阳
  soil: 喜肥沃疏松土壤，需氮较多
  water: 保持土壤湿润，不可缺水

common_diseases:
  - 软腐病
  - 霜霉病
  - 菌核病
  - 病毒病
  - 叶斑病
  - 枯萎病

common_pests:
  - 蚜虫
  - 菜青虫
  - 小菜蛾
  - 跳甲
  - 蜗牛
  - 蛞蝓
  - 潜叶蝇

management_points:
  - 生长周期短(30-60天)
  - 氮肥充足促进叶片生长
  - 注意采收时机保证品质
  - 设施内注意降温管理
  - 夏季遮阳降温防止抽薹
  - 避免连作减少病害积累
  - 采前控水提升口感

crops:
  - 生菜
  - 油菜
  - 菠菜
  - 芹菜
  - 空心菜
  - 茼蒿
  - 苋菜
  - 小白菜
