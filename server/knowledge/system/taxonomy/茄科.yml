# 茄科 - 科属共性知识
family: 茄科
latin_name: Solanaceae

common_traits:
  temperature: 喜温怕霜，适宜温度白天25-28°C，夜间15-18°C
  humidity: 适宜相对湿度60-70%
  light: 喜光，光合效率高
  soil: 喜肥沃疏松土壤，pH 6.0-7.0
  water: 需水规律：苗期少，花果期多，采收期适中

common_diseases:
  - 早疫病
  - 晚疫病
  - 灰霉病
  - 病毒病
  - 蚜虫
  - 白粉虱

common_pests:
  - 蚜虫
  - 白粉虱
  - 烟青虫
  - 棉铃虫

management_points:
  - 整枝打杈促进通风透光
  - 花期注意温湿度控制
  - 盛果期加强水肥管理
  - 注意安全间隔期

crops:
  - 番茄
  - 辣椒
  - 茄子
  - 甜椒
